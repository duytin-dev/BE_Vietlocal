# Render Blueprint — root directory: BE/app
services:
  - type: web
    name: vietlocal-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/destinations
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_SEED_ENABLED
        value: "false"
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: CORS_ORIGIN
        value: http://localhost:5173
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # Postgres: dashboard → Web Service → Environment → Add from database
      # KHÔNG set SPRING_DATASOURCE_URL nếu đã link DB (tránh host internal sai)
