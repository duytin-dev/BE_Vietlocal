# Profile production: spring.profiles.active=prod
# Render: bắt buộc lắng nghe PORT và 0.0.0.0
server.port=${PORT:8080}
server.address=0.0.0.0

# Fail nhanh nếu DB sai (tránh Render báo "No open ports" vì treo kết nối)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

app.flyway.repair-on-start=${FLYWAY_REPAIR_ON_START:false}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.cors.allowed-origins[0]=${CORS_ORIGIN:https://your-frontend-domain.com}

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
