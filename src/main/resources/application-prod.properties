# Profile production: spring.profiles.active=prod
# Render: bắt buộc lắng nghe PORT và 0.0.0.0
server.port=${PORT:8080}
server.address=0.0.0.0

# --- PostgreSQL trên Render ---
# Cách 1 (khuyên dùng): Web Service → Environment → "Add from database" → chọn Postgres
#   Render tự thêm DATABASE_HOST, DATABASE_USER, DATABASE_PASSWORD, DATABASE_NAME, DATABASE_PORT
#   → XÓA biến SPRING_DATASOURCE_URL nếu đang set sai (internal host)
# Cách 2: Set SPRING_DATASOURCE_URL = External JDBC (có sslmode=require), không dùng host dpg-xxx-a
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME:vietlocal_db}?sslmode=require
spring.datasource.username=${DATABASE_USER:${DB_USERNAME}}
spring.datasource.password=${DATABASE_PASSWORD:${DB_PASSWORD}}

spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.initialization-fail-timeout=30000
spring.flyway.connect-retries=3

app.flyway.repair-on-start=${FLYWAY_REPAIR_ON_START:false}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.cors.allowed-origins[0]=${CORS_ORIGIN:http://localhost:5173}

spring.jpa.show-sql=${JPA_SHOW_SQL:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:false}
