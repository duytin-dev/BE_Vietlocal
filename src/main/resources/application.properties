# ========== App ==========
spring.application.name=vietlocal-api
server.port=8080

# Lần đầu dùng Flyway: nếu DB cũ từ hibernate update, xóa DB rồi start lại (psql: DROP DATABASE vietlocal;)
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# Seed sample data on startup (set false in production)
app.seed.enabled=true

# ========== PostgreSQL ==========
spring.datasource.url=jdbc:postgresql://localhost:5432/vietlocal
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema: Flyway tạo bảng trước, Hibernate chỉ validate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Không baseline DB cũ — nếu lỗi thiếu bảng: DROP DATABASE vietlocal; (PostgreSQL) rồi chạy lại app
spring.flyway.baseline-on-migrate=false
# true = gọi flyway.repair() trước migrate (sửa lỗi "failed migration to version 6")
app.flyway.repair-on-start=${FLYWAY_REPAIR_ON_START:true}

# ========== CORS (React) ==========
app.cors.allowed-origins[0]=http://localhost:3000
app.cors.allowed-origins[1]=http://localhost:5173

# ========== AI (Gemini) ==========
# provider: stub (demo) | gemini (Google AI)
spring.config.import=optional:classpath:application-local.properties
app.ai.provider=${AI_PROVIDER:gemini}
# Key: GEMINI_API_KEY hoặc application-local.properties (xem application-local.properties.example)
app.ai.gemini.api-key=${GEMINI_API_KEY:AIzaSyDQCKx2R6jFGabiBUIBDUjsoEdhRoXgqvU}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
app.ai.gemini.fallback-models[0]=gemini-flash-lite-latest
app.ai.gemini.fallback-models[1]=gemini-2.5-flash
# true = nếu mọi model lỗi thì dùng stub demo (tránh màn hình chỉ báo lỗi)
app.ai.gemini.fallback-to-stub=true

# ========== Payment webhook (header X-Payment-Secret) ==========
app.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:vietlocal-dev-secret}

# Admin API (header X-Admin-Secret)
app.admin.secret=${ADMIN_SECRET:vietlocal-admin-dev}

# JWT (login/register) — production: set JWT_SECRET (min 32 chars)
app.auth.jwt.secret=${JWT_SECRET:vietlocal-dev-jwt-secret-change-in-production-min-32}
app.auth.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ========== Swagger ==========
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
