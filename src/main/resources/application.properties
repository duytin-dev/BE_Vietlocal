# ========== App ==========
spring.application.name=${SPRING_APPLICATION_NAME:vietlocal-api}
server.port=${PORT:8080}

# Lần đầu dùng Flyway: nếu DB cũ từ hibernate update, xóa DB rồi start lại (psql: DROP DATABASE vietlocal;)
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# Seed sample data on startup (production: APP_SEED_ENABLED=false)
app.seed.enabled=${APP_SEED_ENABLED:true}

# ========== PostgreSQL ==========
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vietlocal}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema: Flyway tạo bảng trước, Hibernate chỉ validate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
# Không baseline DB cũ — nếu lỗi thiếu bảng: DROP DATABASE vietlocal; (PostgreSQL) rồi chạy lại app
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
# true = gọi flyway.repair() trước migrate (sửa lỗi "failed migration to version 6")
app.flyway.repair-on-start=${FLYWAY_REPAIR_ON_START:true}

# ========== CORS (React) ==========
# Production: set CORS_ORIGIN trên Render (profile prod ghi đè [0])
app.cors.allowed-origins[0]=${CORS_ORIGIN_0:http://localhost:3000}
app.cors.allowed-origins[1]=${CORS_ORIGIN_1:http://localhost:5173}

# ========== AI (Gemini) ==========
# provider: stub (demo) | gemini (Google AI)
spring.config.import=optional:classpath:application-local.properties
app.ai.provider=${AI_PROVIDER:gemini}
# Key: GEMINI_API_KEY hoặc application-local.properties (xem application-local.properties.example)
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-flash-lite-latest}
app.ai.gemini.fallback-models[0]=${GEMINI_FALLBACK_MODEL_0:gemini-flash-lite-latest}
app.ai.gemini.fallback-models[1]=${GEMINI_FALLBACK_MODEL_1:gemini-2.5-flash}
# true = nếu mọi model lỗi thì dùng stub demo (tránh màn hình chỉ báo lỗi)
app.ai.gemini.fallback-to-stub=${AI_FALLBACK_TO_STUB:true}

# ========== Payment webhook (header X-Payment-Secret) ==========
app.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:vietlocal-dev-secret}

# Admin API (header X-Admin-Secret)
app.admin.secret=${ADMIN_SECRET:vietlocal-admin-dev}

# JWT (login/register) — production: set JWT_SECRET (min 32 chars)
app.auth.jwt.secret=${JWT_SECRET:vietlocal-dev-jwt-secret-change-in-production-min-32}
app.auth.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ========== Swagger ==========
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}
