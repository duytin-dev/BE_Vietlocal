spring.datasource.url=jdbc:h2:mem:vietlocal-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=false

app.seed.enabled=true
app.ai.provider=stub
app.payment.webhook-secret=test-secret
app.admin.secret=test-admin-secret
app.cors.allowed-origins[0]=http://localhost:5173
app.auth.jwt.secret=test-jwt-secret-minimum-32-characters-long
